name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  supabase-integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      RUN_SUPABASE_INTEGRATION: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_SECRET_KEY != '' && secrets.INPUT_ACCESS_CODES != '' && '1' || '0' }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      INPUT_ACCESS_CODES: ${{ secrets.INPUT_ACCESS_CODES }}
      WORKSPACE_SESSION_SECRET: ${{ secrets.WORKSPACE_SESSION_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run test:integration
